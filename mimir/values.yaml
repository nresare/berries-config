# From https://github.com/grafana/mimir/blob/main/operations/helm/charts/mimir-distributed/classic-architecture.yaml
# These values override the default configuration to run Grafana Mimir in classic architecture.
# The "classic" architecture is what Mimir 2.x (mimir-distributed Helm chart version 5.x) used by default.
# In this mode, Grafana Mimir doesn't use Kafka to decouple write and read paths. Instead,
# the distributors push series directly to the ingesters.

kafka:
  enabled: false
minio:
  enabled: false

global:
  extraEnv:
    - name: AWS_ROLE_ARN
      value: arn:aws:iam:::role/mimir
    - name: AWS_WEB_IDENTITY_TOKEN_FILE
      value: /var/run/secrets/tokens/sts.amazonaws.com
    - name: AWS_REGION
      value: us-east-1
    - name: AWS_ENDPOINT_URL
      value: http://rook-ceph-rgw-berries.rook-ceph.svc
    - name: AWS_ENDPOINT_URL_STS
      value: http://rook-ceph-rgw-berries.rook-ceph.svc
  extraVolumes:
    - name: tokens
      projected:
        sources:
          - serviceAccountToken:
              path: sts.amazonaws.com
              audience: sts.amazonaws.com
              expirationSeconds: 3600

  extraVolumeMounts:
    - name: tokens
      mountPath: /var/run/secrets/tokens
      readOnly: true

mimir:
  structuredConfig:
    common:
      storage:
        backend: "s3"
        s3:
          endpoint: rook-ceph-rgw-berries.rook-ceph.svc:80
          bucket_name: mimir-data
          region: us-east-1
          insecure: true
          bucket_lookup_type: path
          native_aws_auth_enabled: true
    ingest_storage:
      enabled: false
      kafka:
        address: null
        topic: null
        auto_create_topic_default_partitions: null
    distributor:
      remote_timeout: null
    ingester:
      push_grpc_method_enabled: null
