# App configurations reference releases defined in releases.yaml.
# The release provides the chart source (repo, chart name, version).

[[helm]]
namespace = "cert-manager"
release = "cert-manager"
values = ["cert-manager/values.yaml"]
extra-resources = "cert-manager/extra"

[[helm]]
namespace = "surrealdb"
release = "surrealdb"
init = "surrealdb/fix-permissions.sh"
values = ["surrealdb/values.yaml"]

[[helm]]
namespace = "teleport-cluster"
release = "teleport-cluster"
values = ["teleport/cluster-values.yaml"]
extra-resources = "teleport/extra"

[[helm]]
namespace = "teleport"
release = "teleport-kube-agent"
values = ["teleport/agent-values.yaml"]

[[helm]]
namespace = "envoy-gateway-system"
release = "envoy-gateway"
extra-resources = "envoy-gateway/extra"

[[helm]]
namespace = "envoy-gateway-system"
release = "envoy-gateway-crds"
values = ["envoy/crds-values.yaml"]

[[website]]
name = "repo.noa.re"
namespace = "reposnake"
replicas = 2
image = "repo.noa.re/reposnake:0.2.1-56b70a18"
args = ["-c", "/config/reposnake.toml"]
config = { "/config/reposnake.toml" = "reposnake/reposnake.toml" }
custom-token-audiences = ["idmouse", "sts.amazonaws.com"]
emptydir-path = "/var/tmp"
[website.env]
AWS_STS_REGIONAL_ENDPOINTS = "regional"
AWS_REGION = "eu-west-2"
AWS_ROLE_ARN = "arn:aws:iam::190019502607:role/repo-noa-re"
AWS_WEB_IDENTITY_TOKEN_FILE = "/var/run/secrets/tokens/sts.amazonaws.com"

[[website]]
name = "zq.lu"
namespace = "web"
hugo-repo = "https://github.com/nresare/zq.lu"

[[website]]
name = "noa.re"
namespace = "web"
hugo-repo = "https://github.com/nresare/noa.re"
extra-hostnames = "nadia.resare.com"

[[website]]
name = "id.noa.re"
namespace = "idelephant"
replicas = 1
image = "repo.noa.re/idelephant:0.2.2-11f923b5"
args = ["-c", "/config/idelephant.toml"]
custom-token-audiences = ["idmouse"]
external-secrets = [
    "/email-password",
]
[website.config]
"/config/idelephant.toml" = "idelephant/idelephant.toml"

[[website]]
name = "demo.resare.com"
namespace = "demo"
args = ["-c", "/config/config.toml"]
image = "repo.noa.re/oidc-client-demo:0.1.0-0e03f03a"
[website.config]
"/config/config.toml" = "demo/config.toml"

[[website]]
name = "idcat.noa.re"
namespace = "idcat"
replicas = 2
image = "nresare/idcat:0.2.1"
args = ["--debug"]
external-secrets = ["/app-keys"]
[website.config]
"/config/idcat.toml" = "idcat/idcat.toml"

[[website]]
name = "k8s.noa.re"
namespace = "jwksproxy"
replicas = 2
image = "repo.noa.re/jwksproxy:0.1.0-b89ffeed"
[website.config]
"/config/jwksproxy.toml" = "jwksproxy/jwksproxy.toml"


[[website]]
name = "relcoord.noa.re"
namespace = "relcoord"
replicas = 2
image = "repo.noa.re/relcoord:0.1.0-f7caa804"
config = { "/config/relcoord.toml" = "relcoord/relcoord.toml"}
custom-token-audiences = ["idmouse"]

[[copy]]
namespace = "acme-dns"
source = "acme-dns/manifests"
[[copy.config]]
"/etc/acme-dns/config.cfg" = "acme-dns/config.cfg"

[[simple]]
namespace = "idmouse"
extra-resources = "idmouse/extra"
image = "nresare/idmouse:latest"
k8s-role = "idmouse-signing-keys"
[[simple.config]]
"/config/idmouse.toml" = "idmouse/idmouse.toml"
