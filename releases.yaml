repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: surrealdb
    url: https://helm.surrealdb.com
  - name: teleport
    url: https://charts.releases.teleport.dev
  - name: envoyproxy
    url: docker.io/envoyproxy
    oci: true

releases:
  - name: cert-manager
    chart: jetstack/cert-manager
    version: v1.20.1
  - name: surrealdb
    chart: surrealdb/surrealdb
    version: 0.4.0
  - name: teleport-cluster
    chart: teleport/teleport-cluster
    version: 18.7.4
  - name: teleport-kube-agent
    chart: teleport/teleport-kube-agent
    version: 18.7.3
  - name: envoy-gateway
    chart: envoyproxy/gateway-helm
    version: 1.7.1
