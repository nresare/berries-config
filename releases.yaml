    chart: envoyproxy/gateway-crds-helm
    version: 1.8.1
  - name: metrics-server
    chart: metrics-server/metrics-server
    version: 3.13.1
  - name: grafana-operator
    chart: grafana/grafana-operator
    version: 5.24.0
  - name: rook
    chart: rook/rook-ceph
