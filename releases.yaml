repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: surrealdb
    url: https://helm.surrealdb.com
  - name: teleport
    url: https://charts.releases.teleport.dev
  - name: envoyproxy
    url: docker.io/envoyproxy
    oci: true
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  - name: grafana
    url: ghcr.io/grafana/helm-charts
    oci: true
  - name: rook
    url: https://charts.rook.io/release
  - name: ceph-csi-operator
    url: https://ceph.github.io/ceph-csi-operator
  - name: argo
    url: https://argoproj.github.io/argo-helm



releases:
