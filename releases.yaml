repositories:
  - name: jetstack
    url: https://charts.jetstack.io
  - name: surrealdb
    url: https://helm.surrealdb.com
  - name: teleport
    url: https://charts.releases.teleport.dev
  - name: envoyproxy
    url: docker.io/envoyproxy
    oci: true
  - name: metrics-server
    url: https://kubernetes-sigs.github.io/metrics-server/
  - name: grafana
    url: ghcr.io/grafana/helm-charts
    oci: true

releases:
  - name: cert-manager
    chart: jetstack/cert-manager
    version: v1.20.2
  - name: surrealdb
    chart: surrealdb/surrealdb
    version: 0.4.0
  - name: teleport-cluster
    chart: teleport/teleport-cluster
    version: 18.8.3
  - name: teleport-kube-agent
    chart: teleport/teleport-kube-agent
    version: 18.8.3
  - name: envoy-gateway
    chart: envoyproxy/gateway-helm
    version: 1.8.1
  - name: envoy-gateway-crds
    chart: envoyproxy/gateway-crds-helm
    version: 1.8.1
  - name: metrics-server
    chart: metrics-server/metrics-server
    version: 3.13.1
  - name: grafana-operator
    chart: grafana/grafana-operator
    version: 5.24.0
