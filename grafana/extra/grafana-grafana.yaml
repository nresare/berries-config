apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
spec:
    persistentVolumeClaim:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
    service:
      metadata:
        labels:
          noa.re/discover: enabled
        annotations:
          teleport.dev/name: grafana
